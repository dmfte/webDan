<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vista previa de Pictures Per Page</title>
  <desc id="desc">Interfaz de impresión con panel de configuración y páginas con fotos organizadas.</desc>
  <defs>
