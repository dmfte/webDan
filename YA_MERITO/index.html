<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YA MERITO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section id="configuracion">
            <ul>
                <li>
                    <label>
                        <input type="checkbox" id="horaDispositivo">
                        <span>Hora del dispositivo</span>
                    </label>
                    <small>Si está activado, la cuenta regresiva e iniciará automáticamente según la hora del dispositivo</small>
                    <ul>
                        <li>
                            <label>
                                <input type="time" id="horaFinal">
                                Hora Final
                            </label>
                        </li>
                        <li>
                            <div class="imagen-fondo-control">
                                <label>
                                    <input type="file" id="imagenFondo" accept="image/*">
                                    <span>Imagen de espera</span>
                                    <span id="nombreImagen">Sin imagen</span>
                                </label>
                                <button type="button" id="limpiarImagenFondo" aria-label="Quitar imagen de espera" title="Quitar imagen de espera" hidden>×</button>
                            </div>
                        </li>
                    </ul>
                </li>
                <li>
                    <label>
                        <input type="checkbox" id="relojAnalogo">
                        <span>Reloj análogo</span><span>Reloj digital</span>
                    </label>
                    <ul style="display: none;">
                        <li>
                            <label>
                                <input type="checkbox" id="mostrarSegundos">
                                Manecilla de segundos
                            </label>
                        </li>
                    </ul>
                </li>
                <li class="lapso-li">
                    <div class="lapso-row">
                        <span>Lapso</span>
                        <div class="lapso-input-group">
                            <input type="text" id="lapso" class="lapso-text" value="00:00" maxlength="5" inputmode="numeric" spellcheck="false" autocomplete="off" placeholder="HH:MM">
                            <button type="button" class="lapso-clock-btn" id="lapsoBtn" aria-label="Abrir selector de lapso">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </button>
                        </div>
                    </div>
                </li>
                <li>
                    <label>
                        <input type="checkbox" name="" id="ventanaExtra">
                        Ventana extra
                    </label>
                    <small>Abrirá una ventana para mostrar el reloj</small>
                    <ul>
                        <li>
                            <label>
                                <input type="checkbox" id="autoCerrarVentanaExtra">
                                Auto cerrar
                            </label>
                            <small>La ventana extra se cerrará automáticamente al terminar el tiempo</small>
                        </li>
                    </ul>
                </li>   
            </ul>
            <button id="iniciarReloj">Iniciar</button>
        </section>
        <section id="reloj">
            <div class="contenedor-reloj"></div>
        </section>
    </main>
<div class="lapso-picker" id="lapsoPicker" hidden>
    <div class="lapso-picker-cols">
        <div class="lapso-col-wrap">
            <div class="lapso-col-hl"></div>
            <div class="lapso-col" id="lapsoHorasCol"></div>
        </div>
        <div class="lapso-col-sep">:</div>
        <div class="lapso-col-wrap">
            <div class="lapso-col-hl"></div>
            <div class="lapso-col" id="lapsoMinutosCol"></div>
        </div>
    </div>
</div>
<script src="index.js"></script>
</body>
</html>
