<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOL Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Texto del Dia</h1>
      <div class="url-row">
        <input type="text" id="urlInput" value="https://wol.jw.org/es/wol/h/r4/lp-s" spellcheck="false" autocomplete="off" />
        <button class="fetch-btn" id="fetchBtn">Cargar</button>
      </div>
    </header>

    <div class="text-display" id="textDisplay">
      <div class="heading" id="heading"></div>
      <span class="theme" id="theme"></span>
      <span id="body"></span>
    </div>

    <div class="controls">
      <button class="btn" id="playBtn" disabled>&#9654; Leer en voz alta</button>
    </div>

    <div id="sliderWrap" class="slider-wrap" hidden></div>

    <div class="status" id="status"></div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
